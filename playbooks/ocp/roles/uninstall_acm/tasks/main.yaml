---
- name: "Check if MultiClusterHub exists"
  kubernetes.core.k8s_info:
    api_version: operator.open-cluster-management.io/v1
    kind: MultiClusterHub
    name: "{{ acm_multiclusterhub_name }}"
    namespace: "{{ acm_multiclusterhub_namespace }}"
  register: multiclusterhub_info
  ignore_errors: true

- name: "Check if MultiClusterObservability custom resource exists"
  kubernetes.core.k8s_info:
    api_version: observability.open-cluster-management.io/v1beta2
    kind: MultiClusterObservability
    name: "{{ mco_cr_name }}"
    namespace: "{{ mco_cr_namespace }}"
  register: mco_cr_info
  ignore_errors: true

- name: "Delete MultiClusterObservability custom resource"
  kubernetes.core.k8s:
    api_version: observability.open-cluster-management.io/v1beta2
    kind: MultiClusterObservability
    name: "{{ mco_cr_name }}"
    namespace: "{{ mco_cr_namespace }}"
    state: absent
  when: mco_cr_info.resources | length > 0

