---
# Full hub uninstall: detach ManagedClusters before MCH, then MCO (full mode), MultiClusterHub, …

# CR-only: still detach managed clusters before deleting MCH (does not remove MCO unless you run main separately)
- name: "Detach managed clusters before MultiClusterHub removal (CR-only path)"
  ansible.builtin.include_tasks: managed_clusters_detach.yaml
  when:
    - acm_uninstall_mode | default('full') == 'multiclusterhub_cr_only'
    - cleanup_managed_clusters | bool

- name: "Remove MCO and detach managed clusters before hub teardown (full path)"
  ansible.builtin.include_tasks: main.yaml
  when: acm_uninstall_mode | default('full') == 'full'

# RH ACM prerequisites: Discovery + AgentServiceConfig before MultiClusterHub removal
- name: "Uninstall prerequisites per Red Hat documentation (Discovery, AgentServiceConfig)"
  ansible.builtin.include_tasks: uninstall_prerequisites.yaml
  when: acm_uninstall_prerequisites_per_doc | default(true) | bool

- name: "Check if MultiClusterHub exists"
  kubernetes.core.k8s_info:
    api_version: operator.open-cluster-management.io/v1
    kind: MultiClusterHub
    name: "{{ acm_multiclusterhub_name }}"
    namespace: "{{ acm_multiclusterhub_namespace }}"
  register: multiclusterhub_info
  ignore_errors: true

# RH ACM 2.16 spec field: disableHubSelfManagement
- name: "Disable hub self-management on MultiClusterHub before delete"
  kubernetes.core.k8s:
    state: present
    definition: "{{ multiclusterhub_info.resources[0] | combine({'spec': (multiclusterhub_info.resources[0].spec | default({}) | combine({'disableHubSelfManagement': true}))}, recursive=true) }}"
  when: multiclusterhub_info.resources | length > 0

- name: "Delete MultiClusterHub custom resource"
  kubernetes.core.k8s:
    api_version: operator.open-cluster-management.io/v1
    kind: MultiClusterHub
    name: "{{ acm_multiclusterhub_name }}"
    namespace: "{{ acm_multiclusterhub_namespace }}"
    state: absent
    delete_all: true
  when: multiclusterhub_info.resources | length > 0

- name: "Wait for MultiClusterHub custom resource to be fully removed"
  kubernetes.core.k8s_info:
    api_version: operator.open-cluster-management.io/v1
    kind: MultiClusterHub
    name: "{{ acm_multiclusterhub_name }}"
    namespace: "{{ acm_multiclusterhub_namespace }}"
  register: mch_deletion_wait
  until: mch_deletion_wait.resources | default([]) | length == 0
  retries: "{{ multiclusterhub_deletion_retries | default(60) }}"
  delay: "{{ multiclusterhub_deletion_delay | default(10) }}"
  failed_when: false
  when:
    - wait_for_multiclusterhub_deletion | default(true) | bool
    - multiclusterhub_info.resources | length > 0

- name: "MultiClusterHub CR-only uninstall complete (operator remains)"
  ansible.builtin.debug:
    msg: >-
      MultiClusterHub custom resource removed. ACM operator Subscription/CSV and hub namespace are unchanged.
      Recreate MultiClusterHub when ready with the same settings. (acm_uninstall_mode=multiclusterhub_cr_only)
  when:
    - acm_uninstall_mode | default('full') == 'multiclusterhub_cr_only'
    - multiclusterhub_info.resources | length > 0

- name: "MultiClusterHub CR-only mode — no MultiClusterHub CR found"
  ansible.builtin.debug:
    msg: >-
      No MultiClusterHub CR present; nothing removed. Operator unchanged. (acm_uninstall_mode=multiclusterhub_cr_only)
  when:
    - acm_uninstall_mode | default('full') == 'multiclusterhub_cr_only'
    - multiclusterhub_info.resources | length == 0

- name: End play after MultiClusterHub CR-only uninstall
  ansible.builtin.meta: end_play
  when: acm_uninstall_mode | default('full') == 'multiclusterhub_cr_only'

# Operator/MCE/webhook/namespace teardown lives in full_uninstall.yaml, which imports this file first.
