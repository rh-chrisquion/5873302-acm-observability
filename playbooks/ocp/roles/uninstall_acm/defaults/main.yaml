---
# Uninstall depth:
#   full — delete MultiClusterObservability (if present), MultiClusterHub, then operator/MCE/webhooks/namespace per other vars (default).
#   multiclusterhub_cr_only — remove only the MultiClusterHub CR (and disable self-management if needed); leaves ACM operator Subscription/CSV and hub namespace for reinstall with the same settings.
acm_uninstall_mode: full

# ACM MultiClusterHub name (default is 'multiclusterhub')
acm_multiclusterhub_name: "multiclusterhub"

# ACM MultiClusterHub namespace (default is 'open-cluster-management')
acm_multiclusterhub_namespace: "open-cluster-management"

# ACM operator subscription name (default is 'advanced-cluster-management')
acm_operator_subscription_name: "advanced-cluster-management"

# ACM operator subscription namespace (default is 'open-cluster-management')
acm_operator_subscription_namespace: "open-cluster-management"

# Multicluster Engine operator (Subscription + CSV) — default install namespace
mce_operator_subscription_name: "multicluster-engine"
mce_operator_subscription_namespace: "multicluster-engine"
# Remove MCE Subscription and CSV after ACM uninstall (set false if MCE not installed separately)
delete_mce_operator: true
delete_mce_operator_csv: true
# Delete MultiClusterEngine CR first (stops addons e.g. cluster-proxy before removing operator).
# Independent of delete_mce_operator — set false only to skip removing the MultiClusterEngine CR.
delete_multiclusterengine_cr: true
# After MCE operator removal: delete CRDs listed on CSV spec.customresourcedefinitions.owned (plus target_delete_mce_crds_extra). Only when delete_mce_operator is true (gather requires CSVs). Requires jq on the control host.
delete_mce_operator_crds: true
# Extra CRD metadata.name values to remove after MCE operator teardown (merged with CSV discovery)
target_delete_mce_crds_extra: []
# Wait loop after MultiClusterEngine CR delete (full_uninstall.yaml)
mce_cr_deletion_retries: 60
mce_cr_deletion_delay: 10
# After MCE operator removal, empty multicluster-engine namespace and delete it (stops leftover pods)
preclean_mce_namespace_before_delete: true
mce_namespace_preclean_passes: 3
delete_mce_namespace: true

# Remove ACM/MCE dynamic console plugins (ConsolePlugin CRs + Console operator plugin list)
delete_acm_console_plugins: true
acm_console_plugin_names:
  - "acm"
  - "mce"

# After oc delete MultiClusterHub, poll until gone (uninstall can take a long time)
wait_for_multiclusterhub_deletion: true

# Maximum retries when waiting for MultiClusterHub deletion
multiclusterhub_deletion_retries: 60

# Delay between retries (in seconds)
multiclusterhub_deletion_delay: 10

# MultiClusterObservability CR name (default is 'observability')
mco_cr_name: "observability"

# Namespace where MultiClusterObservability CR is installed
mco_cr_namespace: "open-cluster-management"

# If MCO is managed by Argo CD Application, remove it before deleting MCO CR (avoids GitOps recreating it).
# Default true: no-op if the Application does not exist; set false if you use a different GitOps flow.
remove_argocd_application: true
mco_argocd_app_name: "mco-observability"
mco_argocd_namespace: "openshift-gitops"

# Wait for MultiClusterObservability CR to be fully deleted
wait_for_mco_deletion: true

# Maximum retries when waiting for MultiClusterObservability deletion
mco_deletion_retries: 60

# Delay between retries when waiting for MultiClusterObservability deletion (seconds)
mco_deletion_delay: 10

# Delete the operator CSV after uninstalling
delete_operator_csv: true

# After ACM Subscription delete: remove remaining CSVs / InstallPlans / OperatorGroups in the ACM namespace (mirrors MCE cleanup)
delete_acm_olm_leftovers: true

# Delete the operator namespace after uninstalling
delete_operator_namespace: true

# After requesting namespace deletion, patch metadata.finalizers to [] (helps stuck Terminating namespaces)
strip_namespace_finalizers_on_delete: true
# After oc patch, use jq + oc replace --raw .../finalize (requires jq on the control host)
strip_namespace_use_jq_finalize: true

# Before deleting open-cluster-management: strip finalizers on Subscriptions/CSVs/Pods/etc. inside the namespace
strip_finalizers_on_namespace_contents: true

# After delete + first finalizer patch, retry stripping object + namespace finalizers (handles re-added finalizers)
ocm_namespace_aggressive_terminating_recovery: true
ocm_namespace_terminating_recovery_attempts: 12
ocm_namespace_terminating_recovery_delay_seconds: 15

# Delete open-cluster-management-observability (MCO operands) when uninstalling observability from full_uninstall
delete_observability_namespace: true

# Observability namespace created by MCO (full_uninstall)
observability_namespace_name: "open-cluster-management-observability"

# Before deleting the namespace, delete all remaining namespaced resources (multiple passes; requires oc)
preclean_ocm_namespace_before_delete: true
ocm_namespace_preclean_passes: 3

# Detach managed clusters: delete KlusterletAddonConfig then ManagedCluster (tasks/main.yaml)
cleanup_managed_clusters: true

# RH ACM doc: do not detach the hub self-managed ManagedCluster (default name local-cluster)
acm_local_cluster_managedcluster_name: "local-cluster"
managedcluster_detach_skip_names: "{{ [acm_local_cluster_managedcluster_name | default('local-cluster')] }}"

# RH ACM 2.16 — before MultiClusterHub: Discovery + AgentServiceConfig
acm_uninstall_prerequisites_per_doc: true
cleanup_discoveryconfigs: true
cleanup_agent_service_configs: true

# Clean up ACM-related API services
delete_target_apiservices: ["v1.admission.cluster.open-cluster-management.io", "v1.admission.work.open-cluster-management.io"]

# Clean up ClusterRole artifacts
delete_target_clusterroles: ["open-cluster-management:cert-policy-controller", "open-cluster-management:cluster-manager-admin", "open-cluster-management:config-policy-controller", "open-cluster-management:endpoint-observability-operator", "open-cluster-management:governance-policy-framework", "open-cluster-management:governance-policy-framework-kube-rbac-proxy", "multiclusterengines.multicluster.openshift.io-v1-admin", "multiclusterengines.multicluster.openshift.io-v1-crdview", "multiclusterengines.multicluster.openshift.io-v1-edit", "multiclusterengines.multicluster.openshift.io-v1-view", "open-cluster-management:addons:application-manager", "open-cluster-management:admin-aggregate", "open-cluster-management:cert-policy-controller-hub", "open-cluster-management:cluster-manager-admin-aggregate", "open-cluster-management:config-policy-controller-hub", "open-cluster-management:edit-aggregate", "open-cluster-management:policy-framework-hub", "open-cluster-management:view-aggregate"]

# Clean up ACM-related MutatingWebhookConfigurations
target_delete_mutating_webhook_configurations: ["ocm-mutating-webhook", "managedclustermutators.admission.cluster.open-cluster-management.io", "multicluster-observability-operator"]

# Clean up ACM-related ValidatingWebhookConfigurations
target_delete_validating_webhook_configurations: ["channels.apps.open.cluster.management.webhook.validator", "application-webhook-validator", "multiclusterhub-operator-validating-webhook", "ocm-validating-webhook", "multicluster-observability-operator", "multiclusterengines.multicluster.openshift.io"]

# Optional extra CRD names (must be real CRD metadata.name values). Usually leave empty.
target_delete_crd_artifacts: []

# Delete CRD resources after operator teardown (RH doc §1.11 — reinstall / older-version prep). Set false to leave CRDs.
delete_acm_crds_after_operator_uninstall: true

# Exact `oc delete crd …` names from RH ACM 2.16 — Cleaning up artifacts (do not reorder):
# https://docs.redhat.com/en/documentation/red_hat_advanced_cluster_management_for_kubernetes/2.16/html-single/install/index#cleanup-artifacts
rh_acm_cleanup_artifact_crds_doc_2_16:
  - klusterletaddonconfigs.agent.open-cluster-management.io
  - placementbindings.policy.open-cluster-management.io
  - policies.policy.open-cluster-management.io
  - userpreferences.console.open-cluster-management.io
  - discoveredclusters.discovery.open-cluster-management.io
  - discoveryconfigs.discovery.open-cluster-management.io

# CRDs not in the published script; set [] to match the doc exactly
target_delete_acm_crds_extra:
  - multiclusterroleassignments.rbac.open-cluster-management.io

# Effective list for the CRD delete task (override `target_delete_acm_crds` in inventory to replace entirely)
target_delete_acm_crds: "{{ rh_acm_cleanup_artifact_crds_doc_2_16 + target_delete_acm_crds_extra }}"
