---
- name: "Create backup directory for GitOps manifests"
  ansible.builtin.file:
    path: "{{ gitops_backup_dir }}"
    state: directory
    mode: "0755"

- name: "Check if GitOps namespace exists"
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Namespace
    name: "{{ gitops_namespace }}"
  register: gitops_namespace_info
  ignore_errors: true

- name: "Save Argo CD RBAC ConfigMap (argocd-rbac-cm)"
  kubernetes.core.k8s_info:
    api_version: v1
    kind: ConfigMap
    name: argocd-rbac-cm
    namespace: "{{ gitops_namespace }}"
  register: argocd_rbac_cm_info
  ignore_errors: true
  when:
    - save_argocd_rbac_cm | bool
    - gitops_namespace_info.resources | length > 0

- name: "Write argocd-rbac-cm to backup directory"
  ansible.builtin.copy:
    content: "{{ argocd_rbac_cm_info.resources[0] | to_nice_yaml }}"
    dest: "{{ gitops_backup_dir }}/argocd-rbac-cm.yaml"
  when:
    - save_argocd_rbac_cm | bool
    - gitops_namespace_info.resources | length > 0
    - argocd_rbac_cm_info.resources | length > 0

- name: "Save Argo RBAC ClusterRoleBindings"
  kubernetes.core.k8s_info:
    api_version: rbac.authorization.k8s.io/v1
    kind: ClusterRoleBinding
    name: "{{ item }}"
  register: gitops_crb_info
  loop: "{{ gitops_rbac_clusterrolebinding_names | default([]) }}"
  ignore_errors: true
  when: gitops_rbac_clusterrolebinding_names is defined and gitops_rbac_clusterrolebinding_names | length > 0

- name: "Write each ClusterRoleBinding to backup directory"
  ansible.builtin.copy:
    content: "{{ item.resources[0] | to_nice_yaml }}"
    dest: "{{ gitops_backup_dir }}/clusterrolebinding-{{ item.item }}.yaml"
  loop: "{{ (gitops_crb_info.results | default([])) if (gitops_crb_info is defined) else [] }}"
  when:
    - item.resources is defined
    - item.resources | length > 0
  loop_control:
    label: "{{ item.item }}"

- name: "Get repository connection secrets from GitOps namespace"
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    namespace: "{{ gitops_namespace }}"
    label_selectors:
      - "argocd.argoproj.io/secret-type=repository"
  register: repo_secrets_info
  ignore_errors: true
  when:
    - save_repo_connections | bool
    - gitops_namespace_info.resources | length > 0

- name: "Write repository secret manifests to backup directory"
  ansible.builtin.copy:
    content: "{{ item | to_nice_yaml }}"
    dest: "{{ gitops_backup_dir }}/secret-repo-{{ item.metadata.name }}.yaml"
  loop: "{{ repo_secrets_info.resources | default([]) }}"
  when:
    - save_repo_connections | bool
    - gitops_namespace_info.resources | length > 0
    - repo_secrets_info.resources is defined
    - repo_secrets_info.resources | length > 0

- name: "Get cluster connection secrets from GitOps namespace"
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Secret
    namespace: "{{ gitops_namespace }}"
    label_selectors:
      - "argocd.argoproj.io/secret-type=cluster"
  register: cluster_secrets_info
  ignore_errors: true
  when:
    - save_cluster_connections | bool
    - gitops_namespace_info.resources | length > 0

- name: "Write cluster secret manifests to backup directory"
  ansible.builtin.copy:
    content: "{{ item | to_nice_yaml }}"
    dest: "{{ gitops_backup_dir }}/secret-cluster-{{ item.metadata.name }}.yaml"
  loop: "{{ cluster_secrets_info.resources | default([]) }}"
  when:
    - save_cluster_connections | bool
    - gitops_namespace_info.resources | length > 0
    - cluster_secrets_info.resources is defined
    - cluster_secrets_info.resources | length > 0

- name: "Check if OpenShift GitOps operator Subscription exists"
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: "{{ gitops_operator_subscription_name }}"
    namespace: "{{ gitops_operator_namespace }}"
  register: gitops_subscription_info
  ignore_errors: true

- name: "Get current CSV from GitOps Subscription"
  ansible.builtin.set_fact:
    gitops_current_csv: "{{ gitops_subscription_info.resources[0].status.currentCSV }}"
  when:
    - gitops_subscription_info.resources | length > 0
    - gitops_subscription_info.resources[0].status.currentCSV is defined

- name: "Delete GitOpsService cluster (doc: oc delete gitopsservice cluster -n openshift-gitops)"
  kubernetes.core.k8s:
    api_version: pipelines.openshift.io/v1alpha1
    kind: GitopsService
    name: "{{ gitops_service_name }}"
    namespace: "{{ gitops_namespace }}"
    state: absent
  ignore_errors: true
  when: gitops_namespace_info.resources | length > 0

- name: "Check if ArgoCD custom resource exists"
  kubernetes.core.k8s_info:
    api_version: argoproj.io/v1beta1
    kind: ArgoCD
    name: openshift-gitops
    namespace: "{{ gitops_namespace }}"
  register: argocd_cr_info
  ignore_errors: true
  when: gitops_namespace_info.resources | length > 0

- name: "Delete ArgoCD custom resource (openshift-gitops instance)"
  kubernetes.core.k8s:
    api_version: argoproj.io/v1beta1
    kind: ArgoCD
    name: openshift-gitops
    namespace: "{{ gitops_namespace }}"
    state: absent
  when:
    - gitops_namespace_info.resources | length > 0
    - argocd_cr_info.resources | length > 0

- name: "Wait for ArgoCD CR to be deleted"
  kubernetes.core.k8s_info:
    api_version: argoproj.io/v1beta1
    kind: ArgoCD
    name: openshift-gitops
    namespace: "{{ gitops_namespace }}"
  register: argocd_cr_deleted
  until: argocd_cr_deleted.resources | length == 0
  retries: 30
  delay: 10
  failed_when: false
  when:
    - gitops_namespace_info.resources | length > 0
    - argocd_cr_info.resources | length > 0

- name: "Delete OpenShift GitOps operator Subscription"
  kubernetes.core.k8s:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: "{{ gitops_operator_subscription_name }}"
    namespace: "{{ gitops_operator_namespace }}"
    state: absent
  when: gitops_subscription_info.resources | length > 0

- name: "Wait for GitOps Subscription to be deleted"
  kubernetes.core.k8s_info:
    api_version: operators.coreos.com/v1alpha1
    kind: Subscription
    name: "{{ gitops_operator_subscription_name }}"
    namespace: "{{ gitops_operator_namespace }}"
  register: subscription_deleted
  until: subscription_deleted.resources | length == 0
  retries: 30
  delay: 5
  failed_when: false
  when: gitops_subscription_info.resources | length > 0

- name: "Delete OpenShift GitOps operator CSV"
  kubernetes.core.k8s:
    api_version: operators.coreos.com/v1alpha1
    kind: ClusterServiceVersion
    name: "{{ gitops_current_csv }}"
    namespace: "{{ gitops_operator_namespace }}"
    state: absent
  ignore_errors: true
  when:
    - delete_operator_csv | bool
    - gitops_current_csv is defined
  register: delete_csv_result

- name: "Warn if CSV was already removed (e.g. by OLM)"
  ansible.builtin.debug:
    msg: "CSV {{ gitops_current_csv }} was already absent (OLM may have removed it)."
  when:
    - delete_operator_csv | bool
    - gitops_current_csv is defined
    - delete_csv_result is failed

- name: "Delete GitOps namespace"
  kubernetes.core.k8s:
    api_version: v1
    kind: Namespace
    name: "{{ gitops_namespace }}"
    state: absent
  when:
    - delete_gitops_namespace | bool
    - gitops_namespace_info.resources | length > 0

- name: "Wait for GitOps namespace deletion to complete"
  kubernetes.core.k8s_info:
    api_version: v1
    kind: Namespace
    name: "{{ gitops_namespace }}"
  register: namespace_deleted
  until: namespace_deleted.resources | length == 0
  retries: 30
  delay: 5
  failed_when: false
  when:
    - delete_gitops_namespace | bool
    - gitops_namespace_info.resources | length > 0

- name: "Display backup location"
  ansible.builtin.debug:
    msg: "Argo RBAC and repo connection manifests saved to {{ gitops_backup_dir }}. Before re-applying, remove metadata.resourceVersion, metadata.uid, and metadata.creationTimestamp from saved resources if needed."
