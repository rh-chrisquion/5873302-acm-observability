# Full ACM uninstall (MCO + detach MCs when full mode, then MCH + operator/MCE teardown).
# For MultiClusterHub CR-only: acm_uninstall_mode: multiclusterhub_cr_only
# For MCO + detach only (no MCH/operator removal): use role default main.yaml, e.g. include_role tasks_from: main.yaml
- name: Uninstall ACM
  hosts: localhost
  vars_files:
    - ../group_vars/all.yaml
  gather_facts: false
  tasks:
    - name: Run uninstall_acm hub teardown
      ansible.builtin.include_role:
        name: uninstall_acm
        tasks_from: hub_uninstall.yaml
