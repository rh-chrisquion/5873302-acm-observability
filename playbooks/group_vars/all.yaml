---
# Common Directories
bin_dir: "~/.local/bin"
working_dir: "{{ tmp_dir }}"
install_dir: "{{ working_dir }}/install"

# Minimum for VMware + ACM agent provisioning (acm_agent_provision / cluster-manifests.yaml.j2):
#   pull_secret -> dockerconfig Secret for ClusterDeployment / InfraEnv
#   ssh_key     -> InfraEnv.spec.sshAuthorizedKey (coreos debug access)
# Override paths or replace lookups with vault / inline JSON as needed.
install_config:
  pull_secret: "{{ lookup('file', '~/pull-secret.json') | from_json }}"
  ssh_key: "{{ lookup('file', '~/.ssh/id_ed25519.pub') }}"

