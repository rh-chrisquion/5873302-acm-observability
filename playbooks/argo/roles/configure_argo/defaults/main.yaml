---
# defaults/main.yaml (gitops_repo_url comes from role dependency arg_gitops_repo)
repo_name: gitops-install-acm

# Backwards-compatible alias for templates/docs; same as gitops_repo_url
repo_url: "{{ gitops_repo_url }}"

# AppProject sourceRepos: primary repo + any extra (e.g. second catalog); all must match Application repoURLs
project_source_repos_extra: []
project_source_repos: "{{ ([gitops_repo_url] + (project_source_repos_extra | default([]))) | unique | list }}"

# Username for GitLab PAT auth (often "git" or "oauth2"; set in secrets.yml as vault_repo_username to override)
repo_username: "git"
argocd_project: acm

app_project_name: acm
app_project_description: "AppProject for Advanced Cluster Management"

argocd_namespace: openshift-gitops
argocd_rbac_admins: ["system:authenticated"]  # RHDP default. Set to the group(s) you want.
